<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>StealthSurf VPN — Авторизация</title>
	<style>
		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			margin: 0;
			background: #f5f5f5;
			color: #333;
		}
		@media (prefers-color-scheme: dark) {
			body { background: #1a1a1a; color: #e0e0e0; }
		}
		.container {
			text-align: center;
			padding: 40px;
		}
		.success { color: #4CAF50; font-size: 48px; }
		.error { color: #f44336; font-size: 48px; }
		h2 { margin: 16px 0 8px; }
		p { opacity: 0.7; }
	</style>
</head>
<body>
	<div class="container" id="content">
		<div class="success">&#10003;</div>
		<h2>Загрузка...</h2>
	</div>
	<script>
		(async () => {
			const container = document.getElementById("content");

			try {
				const params = new URLSearchParams(window.location.search);
				const code = params.get("code");

				if (!code) throw new Error("Код авторизации не найден в URL");

				const result = await browser.runtime.sendMessage({
					type: "AUTH_FIREFOX_CODE",
					code,
				});

				if (result?.error) throw new Error(result.error);

				container.innerHTML =
					'<div class="success">&#10003;</div>' +
					"<h2>Авторизация успешна</h2>" +
					"<p>Можете закрыть эту вкладку и вернуться в расширение.</p>";

				setTimeout(() => window.close(), 2000);
			} catch (err) {
				container.innerHTML =
					'<div class="error">&#10007;</div>' +
					"<h2>Ошибка авторизации</h2>" +
					"<p></p>";
				container.querySelector("p").textContent = err.message;
			}
		})();
	</script>
</body>
</html>
